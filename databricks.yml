# Databricks Asset Bundle — gaim-executive-app
# Manages the ARR Forecast Prophet notebook job and the Databricks App deployment.
#
# Prerequisites:
#   databricks CLI v0.200+ installed and configured
#     databricks configure --host https://goto-eureka-mdl-1.cloud.databricks.com
#
# Deploy & create job:
#   databricks bundle deploy --target prod
#
# Trigger a manual forecast run:
#   databricks bundle run arr_forecast_prophet --target prod

bundle:
  name: gaim-executive-app

workspace:
  host: https://goto-data-dock.cloud.databricks.com

resources:
  jobs:
    arr_forecast_prophet:
      name: "ARR Forecast Prophet — Weekly"
      description: >
        Trains Prophet models for all Geo x Product segments using
        federated.sales.metis_won_opps_fact and writes forecast results to
        datagroup_mdl.mdl_sales_analytics.arr_forecast_prophet.
        The gaim-executive-app FastAPI reads from that table.

      # ── Schedule: every Monday at 6:00 AM UTC ─────────────────────────────
      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"
        timezone_id: UTC
        pause_status: UNPAUSED

      # ── Job cluster: ML runtime has Prophet compatible deps ────────────────
      job_clusters:
        - job_cluster_key: arr_forecast_cluster
          new_cluster:
            spark_version: "15.4.x-cpu-ml-scala2.12"
            node_type_id: m5d.large
            num_workers: 1
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
            data_security_mode: SINGLE_USER

      tasks:
        - task_key: run_arr_forecast_prophet
          job_cluster_key: arr_forecast_cluster
          notebook_task:
            notebook_path: /Users/gaim-team/ARR Forecast Prophet
            source: WORKSPACE
          libraries:
            - pypi:
                package: prophet==1.1.5

      # ── Notify on failure ─────────────────────────────────────────────────
      email_notifications:
        on_failure:
          - dchennamsetty@goto.com

      max_concurrent_runs: 1

    # ── ARR Forecast Ensemble (weekly — 4-model: ETS + Prophet + LightGBM + Chronos) ──
    arr_forecast_ensemble:
      name: "ARR Forecast — 4-Model Ensemble (Weekly)"
      description: >
        PAUSED: no backend route currently reads arr_forecast_ensemble or
        arr_forecast_leaderboard. Re-enable when ForecastingPanel is wired to
        /api/forecast/v2/* which reads arr_forecast_v2 (not this table).

      # ── Schedule: paused — outputs are not consumed by the app ──────────────
      schedule:
        quartz_cron_expression: "0 0 2 ? * MON"
        timezone_id: UTC
        pause_status: PAUSED

      # ── Cluster: ML runtime (prophet, lightgbm, torch/chronos) ───────────
      job_clusters:
        - job_cluster_key: arr_ensemble_cluster
          new_cluster:
            spark_version: "15.4.x-cpu-ml-scala2.12"
            node_type_id: m5d.xlarge    # 32 GB — Chronos-T5-Small needs ~2 GB headroom
            num_workers: 1
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
            spark_env_vars:
              TRANSFORMERS_CACHE: /dbfs/tmp/hf_cache
              HF_HOME:            /dbfs/tmp/hf_cache

      tasks:
        - task_key: run_arr_forecast_ensemble
          job_cluster_key: arr_ensemble_cluster
          notebook_task:
            # Upload notebooks/arr_forecast_ensemble.py to your workspace first:
            #   databricks workspace import notebooks/arr_forecast_ensemble.py \
            #     /Users/gaim-team/arr_forecast_ensemble --format SOURCE --language PYTHON
            notebook_path: /Users/gaim-team/arr_forecast_ensemble
            source: WORKSPACE
          libraries:
            - pypi:
                package: prophet==1.1.5
            - pypi:
                package: lightgbm>=4.3.0
            - pypi:
                package: chronos-forecasting>=1.3.2
            - pypi:
                package: statsmodels>=0.14.0

      email_notifications:
        on_failure:
          - dileep.chennamsetty@goto.com
        on_start: []

      timeout_seconds: 10800       # 3-hour hard limit
      max_concurrent_runs: 1

    # ── ARR Forecast v2 (weekly — Total + Product + Geo, MC-blended actuals) ──
    arr_forecast_v2:
      name: "ARR Forecast v2 — Total+Product+Geo Ensemble (Weekly)"
      description: >
        Trains 5 models (ETS, Prophet, LightGBM, Chronos, Ensemble) on weekly Growth ARR.
        Actuals: SFDC for in-flight month; MC reconciled for closed months.
        Grain: (week x product x sales_market) + Total aggregates.
        Writes to datagroup_mdl.mdl_sales_analytics.arr_forecast_v2
        and datagroup_mdl.mdl_sales_analytics.arr_forecast_v2_leaderboard.

      schedule:
        quartz_cron_expression: "0 0 3 ? * MON"   # Monday 03:00 UTC (after v1 completes)
        timezone_id: UTC
        pause_status: UNPAUSED

      job_clusters:
        - job_cluster_key: arr_v2_cluster
          new_cluster:
            spark_version: "15.4.x-cpu-ml-scala2.12"
            node_type_id: m5d.xlarge    # 32 GB — Chronos needs ~2 GB headroom
            num_workers: 1
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
            spark_env_vars:
              TRANSFORMERS_CACHE: /dbfs/tmp/hf_cache
              HF_HOME:            /dbfs/tmp/hf_cache

      tasks:
        - task_key: run_arr_forecast_v2_main
          job_cluster_key: arr_v2_cluster
          notebook_task:
            # Upload first:
            #   databricks workspace import notebooks/arr_forecast_v2_main.py \
            #     /Users/gaim-team/arr_forecast_v2_main --format SOURCE --language PYTHON --overwrite
            notebook_path: /Users/gaim-team/arr_forecast_v2_main
            source: WORKSPACE
          libraries:
            - pypi:
                package: prophet==1.1.5
            - pypi:
                package: lightgbm>=4.3.0
            - pypi:
                package: statsmodels>=0.14.0

        - task_key: run_arr_forecast_v2_chronos
          depends_on:
            - task_key: run_arr_forecast_v2_main
          job_cluster_key: arr_v2_cluster
          notebook_task:
            # Upload first:
            #   databricks workspace import notebooks/arr_forecast_v2_chronos.py \
            #     /Users/gaim-team/arr_forecast_v2_chronos --format SOURCE --language PYTHON --overwrite
            notebook_path: /Users/gaim-team/arr_forecast_v2_chronos
            source: WORKSPACE
          libraries:
            - pypi:
                package: chronos-forecasting>=1.3.2
            - pypi:
                package: transformers>=4.40.0
            - pypi:
                package: torch>=2.0.0

      email_notifications:
        on_failure:
          - dileep.chennamsetty@goto.com
        on_start: []

      timeout_seconds: 14400       # 4-hour limit (11 slices × 2 horizon types)
      max_concurrent_runs: 1

    # ── Job 1: Metrics Refresh (every 4 hours) ──────────────────────────────
    atlas_job1_metrics_refresh:
      name: "Atlas | Job1 — Metrics Refresh (4h)"
      description: >
        Reads from gaim_pipeline_daily_snapshot + federated.sales.* + metis_targets_summary.
        Computes all 9 KPIs vs paced targets, writes to atlas.metrics_summary,
        atlas.metrics_history, and atlas.revenue_gap_decomposition.

      schedule:
        quartz_cron_expression: "0 0 0/4 * * ?"   # every 4h on the hour
        timezone_id: America/New_York
        pause_status: UNPAUSED

      job_clusters:
        - job_cluster_key: atlas_shared_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: m5d.large
            num_workers: 1
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

      tasks:
        - task_key: metrics_refresh
          job_cluster_key: atlas_shared_cluster
          notebook_task:
            notebook_path: /Users/gaim-team/atlas-jobs/job1_metrics_refresh
            source: WORKSPACE

      email_notifications:
        on_failure:
          - dchennamsetty@goto.com

      max_concurrent_runs: 1

    # ── Job 2: AI Insights Generation (every 6 hours) ───────────────────────
    atlas_job2_insights_generation:
      name: "Atlas | Job2 — AI Insights Generation (6h)"
      description: >
        Reads KPI data, runs rule engine for threshold detection, then calls
        Databricks Foundation Model API (databricks-claude-sonnet-4-6) to
        generate natural-language insights. Writes to atlas.insights_cache.
        Extended TTL of 6h keeps the app responsive even if this job is delayed.

      schedule:
        quartz_cron_expression: "0 30 1/6 * * ?"  # every 6h at :30 (offset from Job 1)
        timezone_id: America/New_York
        pause_status: UNPAUSED

      job_clusters:
        - job_cluster_key: atlas_shared_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: m5d.large
            num_workers: 1
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

      tasks:
        - task_key: insights_generation
          job_cluster_key: atlas_shared_cluster
          notebook_task:
            notebook_path: /Users/gaim-team/atlas-jobs/job2_insights_generation
            source: WORKSPACE

      email_notifications:
        on_failure:
          - dchennamsetty@goto.com

      max_concurrent_runs: 1

    # ── Job 3: Forecast Scoring (nightly) ────────────────────────────────────
    atlas_job3_forecast_scoring:
      name: "Atlas | Job3 — Forecast Scoring (nightly)"
      description: >
        Runs Holt-Winters, ARIMA, Triple Smoothing, and Linear+Seasonal models
        for 4 core metrics across 30/60/90 day horizons. Computes confidence
        intervals and selects best model by MAPE on held-out last 30 days.
        Writes to atlas.forecast_results. Uses databricks-claude-sonnet-4-6
        to generate 4-box intelligence text (drivers / actions / risks / opps).

      schedule:
        quartz_cron_expression: "0 0 3 * * ?"     # 3 AM Eastern daily
        timezone_id: America/New_York
        pause_status: UNPAUSED

      job_clusters:
        - job_cluster_key: atlas_ml_cluster
          new_cluster:
            spark_version: "15.4.x-cpu-ml-scala2.12"   # ML runtime for scipy/numpy
            node_type_id: m5d.large
            num_workers: 1
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

      tasks:
        - task_key: forecast_scoring
          job_cluster_key: atlas_ml_cluster
          notebook_task:
            notebook_path: /Users/gaim-team/atlas-jobs/job3_forecast_scoring
            source: WORKSPACE

      email_notifications:
        on_failure:
          - dchennamsetty@goto.com

      max_concurrent_runs: 1

    # ── Job 4: Alert Dispatcher (every 4 hours) ──────────────────────────────
    atlas_job4_alert_dispatcher:
      name: "Atlas | Job4 — Alert Dispatcher (4h)"
      description: >
        Reads atlas.metrics_summary against atlas.alert_rules. For each rule breach,
        checks cooldown window to suppress duplicates, then fires Slack webhook
        and/or AWS SES email. Writes dispatched alerts to atlas.alerts_queue.
        Also writes to atlas_notifications for in-app display.
        Runs 30 min after Job 1 so it always works on fresh metric data.

      schedule:
        quartz_cron_expression: "0 30 0/4 * * ?"  # every 4h at :30 (after Job 1)
        timezone_id: America/New_York
        pause_status: UNPAUSED

      job_clusters:
        - job_cluster_key: atlas_shared_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: m5d.large
            num_workers: 1
            data_security_mode: SINGLE_USER

      tasks:
        - task_key: alert_dispatcher
          job_cluster_key: atlas_shared_cluster
          notebook_task:
            notebook_path: /Users/gaim-team/atlas-jobs/job4_alert_dispatcher
            source: WORKSPACE

      email_notifications:
        on_failure:
          - dchennamsetty@goto.com

      max_concurrent_runs: 1

    # ── KPI Daily Refresh + AI Insights (daily 7 AM ET) ──────────────────────
    atlas_kpi_daily:
      name: "Atlas | KPI Daily — Refresh + AI Insights (7 AM ET)"
      description: >
        Task 1 (kpi_refresh): reads federated.sales.metis_* + gaim_pipeline_daily_snapshot
        + gaim_mql_daily_snapshot, computes all 15 sales KPIs, and writes/merges to
        datagroup_mdl.mdl_sales_analytics.kpi_daily_summary (company grain) and
        kpi_daily_by_segment (geo × product × channel grain).
        Task 2 (kpi_ai_insights): reads the latest kpi_daily_summary row, calls
        databricks-claude-sonnet-4-6 to generate 5-7 executive insights, and writes
        them to kpi_ai_insights_log. Only runs if Task 1 succeeds.
        Upload notebooks before deploying:
          databricks workspace import notebooks/kpi_daily_refresh.py \
            /Users/gaim-team/kpi_daily_refresh --language PYTHON --overwrite
          databricks workspace import notebooks/kpi_ai_insights.py \
            /Users/gaim-team/kpi_ai_insights --language PYTHON --overwrite

      schedule:
        quartz_cron_expression: "0 0 7 * * ?"   # 7:00 AM Eastern every day
        timezone_id: America/New_York
        pause_status: UNPAUSED

      max_concurrent_runs: 1

      job_clusters:
        - job_cluster_key: kpi_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: i3.xlarge
            num_workers: 1
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

      tasks:
        - task_key: kpi_refresh
          job_cluster_key: kpi_cluster
          notebook_task:
            notebook_path: /Users/gaim-team/kpi_daily_refresh
            source: WORKSPACE
          timeout_seconds: 900
          max_retries: 2
          retry_on_timeout: false

        - task_key: kpi_ai_insights
          depends_on:
            - task_key: kpi_refresh
          job_cluster_key: kpi_cluster
          notebook_task:
            notebook_path: /Users/gaim-team/kpi_ai_insights
            source: WORKSPACE
          timeout_seconds: 300
          max_retries: 1
          retry_on_timeout: false

      email_notifications:
        on_failure:
          - dchennamsetty@goto.com
        no_alert_for_skipped_runs: true

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev

  prod:
    mode: production
    workspace:
      root_path: /Users/gaim-team/.bundle/${bundle.name}/prod
