# Databricks Apps Configuration
# Deploy this app to your Databricks workspace

name: atlas-executive-insights
version: 1.0.0
description: AI-Powered Executive Analytics Dashboard

# Application entry point — reads DATABRICKS_APP_PORT at runtime (Databricks Apps requirement)
command:
  - python
  - backend/start.py

# Python dependencies
requirements: requirements.txt

# Environment configuration
env:
  # Port for the application (required by Databricks Apps)
  - name: PORT
    value: "8000"
  
  # Note: DATABRICKS_HOST and DATABRICKS_TOKEN are automatically provided by Databricks Apps
  # Do NOT set them here - they are injected at runtime
  
  # Data source configuration
  - name: DATABRICKS_CATALOG
    value: "datagroup_mdl"
  
  - name: DATABRICKS_SCHEMA
    value: "mdl_sales_analytics"
  
  - name: DATABRICKS_HTTP_PATH
    value: "/sql/1.0/warehouses/c24ee33594e13e93"
  
  # Application settings
  - name: ENVIRONMENT
    value: "production"
  
  - name: DEBUG
    value: "False"

# Resource requirements
resources:
  cpu: 2
  memory: 4Gi

# Health check
health_check:
  path: /api/health
  port: 8000
  interval_seconds: 30

# Port mapping
port: 8000
